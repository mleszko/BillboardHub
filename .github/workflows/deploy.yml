name: Deploy

on:
  push:
    branches: [main, prod]
  workflow_dispatch:

jobs:
  deploy-backend-railway-dev:
    name: Deploy backend to Railway (DEV)
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.ref_name == 'main' && secrets.RAILWAY_TOKEN != '' && secrets.RAILWAY_SERVICE_ID_DEV != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Trigger Railway deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_DEV }}
        run: railway up --service "$RAILWAY_SERVICE_ID" --detach

  deploy-backend-railway-prod:
    name: Deploy backend to Railway (PROD)
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.ref_name == 'prod' && secrets.RAILWAY_TOKEN != '' && (secrets.RAILWAY_SERVICE_ID_PROD != '' || secrets.RAILWAY_SERVICE_ID != '') }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Trigger Railway deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_PROD != '' && secrets.RAILWAY_SERVICE_ID_PROD || secrets.RAILWAY_SERVICE_ID }}
        run: railway up --service "$RAILWAY_SERVICE_ID" --detach

  deploy-frontend-vercel-dev:
    name: Deploy frontend to Vercel (DEV)
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.ref_name == 'main' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID_DEV != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-frontend-vercel-prod:
    name: Deploy frontend to Vercel (PROD)
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.ref_name == 'prod' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && (secrets.VERCEL_PROJECT_ID_PROD != '' || secrets.VERCEL_PROJECT_ID != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD != '' && secrets.VERCEL_PROJECT_ID_PROD || secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD != '' && secrets.VERCEL_PROJECT_ID_PROD || secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD != '' && secrets.VERCEL_PROJECT_ID_PROD || secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
